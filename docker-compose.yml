services:
  mysql:
    image: mysql:8.0
    container_name: haici-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: haici_cs
      MYSQL_USER: haici
      MYSQL_PASSWORD: haici123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - haici_mysql_data:/var/lib/mysql
      - ./backend/数据库初始化脚本/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.4.24
    container_name: haici-chroma
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - haici_chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  haici_mysql_data:
  haici_chroma_data:
